<style>
  :root{
    color-scheme: light;
    --bg:#f5f3ee; --paper:#ffffff; --text:#2e3a3a; --text-soft:#46514f; --muted:#7b817c;
    --line:#dcd9d1; --line-soft:#eeece6; --bar-track:#e8e6df; --note-bg:#f0eee7;
    --header-bg:#2e3a3a; --header-text:#ffffff; --header-sub:#c7cec9; --brand:#b9c2bd;
    --olive:#5c6650; --notstarted:#9aa0a0; --progress:#c9871f; --complete:#4f7d4a; --accent:#5c6650;
    --sec-num-bg:#2e3a3a; --sec-border:#2e3a3a;
  }
  html[data-theme="dark"]{
    color-scheme: dark;
    --bg:#171d1c; --paper:#212a29; --text:#e9edec; --text-soft:#c2c9c7; --muted:#8b9491;
    --line:#33403e; --line-soft:#2b3534; --bar-track:#2b3534; --note-bg:#1b2322;
    --header-bg:#0f1413; --header-text:#f3f6f5; --header-sub:#aab3b0; --brand:#8a958f;
    --olive:#7d8a6e; --notstarted:#6b726f; --progress:#d39a3f; --complete:#5f9a58; --accent:#7d8a6e;
    --sec-num-bg:#3a4543; --sec-border:#445250;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--text);background:var(--bg);line-height:1.5;-webkit-font-smoothing:antialiased;transition:background .2s,color .2s;}
  .wrap{max-width:1000px;margin:0 auto;padding:24px 28px 64px;}

  .internal-flag{display:flex;align-items:center;gap:10px;font-size:11.5px;color:var(--muted);background:var(--note-bg);border:1px solid var(--line);border-radius:8px;padding:8px 14px;margin-bottom:18px;}
  .internal-flag b{color:var(--text-soft);}
  .internal-flag .ico{width:8px;height:8px;border-radius:50%;background:var(--accent);flex:0 0 auto;}

  .switcher{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:20px;}
  .switcher .lbl{font-size:10.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-right:4px;}
  .cbtn{border:1px solid var(--line);background:var(--paper);color:var(--text-soft);border-radius:20px;padding:7px 16px;
    font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;}
  .cbtn:hover{border-color:var(--accent);color:var(--text);}
  .cbtn.active{background:var(--header-bg);color:var(--header-text);border-color:var(--header-bg);}

  .cobrand{display:flex;align-items:center;gap:14px;margin-bottom:20px;padding:0 2px;color:var(--text);}
  .cobrand .ggm-wm{font-weight:800;font-size:16px;letter-spacing:.3px;}
  .cobrand .bdiv{width:1px;height:22px;background:var(--line);}
  .cobrand .client-chip{font-weight:700;font-size:14px;color:var(--accent);}
  .cobrand .client-logo{height:26px;width:auto;display:block;}
  .cobrand .client-logo[hidden]{display:none;}
  .cobrand .client-chip[hidden]{display:none;}

  header{background:var(--header-bg);color:var(--header-text);border-radius:12px;padding:26px 30px;margin-bottom:18px;}
  .hrow{display:flex;justify-content:space-between;align-items:flex-end;gap:28px;flex-wrap:wrap;}
  .eyebrow{font-size:10.5px;letter-spacing:3px;text-transform:uppercase;color:var(--brand);margin-bottom:9px;}
  header h1{font-size:23px;line-height:1.2;margin:0 0 7px;letter-spacing:.2px;font-weight:800;}
  header .sub{color:var(--header-sub);font-size:13.5px;}
  .trackbadge{display:inline-flex;align-items:center;gap:7px;margin-top:13px;font-size:12px;font-weight:600;padding:5px 12px;border-radius:20px;background:rgba(255,255,255,.10);color:var(--header-text);}
  .trackbadge .tb-dot{width:8px;height:8px;border-radius:50%;}
  .tb-green .tb-dot{background:#5fbf6a;} .tb-done .tb-dot{background:#7fd089;}
  .hmeta{display:flex;gap:26px;flex-wrap:wrap;}
  .mitem{display:flex;flex-direction:column;gap:3px;}
  .mitem .ml{font-size:9.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--brand);}
  .mitem .mv{font-size:14px;color:var(--header-text);font-weight:600;}
  @media (max-width:600px){.hrow{align-items:flex-start;}.hmeta{gap:18px;}}

  .board-callout{display:flex;gap:12px;align-items:flex-start;background:var(--note-bg);border:1px solid var(--line);border-left:4px solid var(--accent);border-radius:10px;padding:13px 18px;margin-bottom:18px;}
  .board-callout .bc-label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent);font-weight:700;flex:0 0 auto;padding-top:2px;}
  .board-callout .bc-text{font-size:13px;color:var(--text-soft);}
  .board-callout[hidden]{display:none;}

  .toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:22px;}
  button.act{border:1px solid var(--text);background:var(--text);color:var(--bg);border-radius:7px;padding:9px 16px;
    font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;}
  button.act.ghost{background:transparent;color:var(--text-soft);border-color:var(--line);}
  button.act:hover{opacity:.9;}
  .updated{font-size:12.5px;color:var(--muted);margin-left:auto;}
  .updated b{color:var(--text-soft);}
  body.printing .toolbar,body.printing .switcher,body.printing .internal-flag{display:none;}

  section{background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:6px 24px 18px;margin-bottom:18px;}
  .sec-head{display:flex;align-items:center;gap:12px;padding:16px 0 10px;border-bottom:2px solid var(--sec-border);margin-bottom:6px;cursor:pointer;user-select:none;}
  .sec-head .chev{font-size:11px;color:var(--muted);transition:transform .15s;flex:0 0 auto;}
  .sec-head.collapsed .chev{transform:rotate(-90deg);}
  .sec-head.collapsed{border-bottom-width:0;margin-bottom:0;padding-bottom:14px;}
  .sec-num{background:var(--sec-num-bg);color:#fff;font-weight:700;font-size:13px;width:26px;height:26px;border-radius:6px;
    display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
  .sec-head h3{margin:0;font-size:15px;letter-spacing:.6px;text-transform:uppercase;}
  .sec-prog{margin-left:auto;font-size:12px;color:var(--muted);}
  .sec-body[hidden]{display:none;}

  .objective{font-size:14.5px;color:var(--text-soft);margin:14px 0 4px;max-width:760px;}
  .contacts{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:16px;}
  .contact{border:1px solid var(--line);border-radius:9px;padding:12px 14px;}
  .contact .cn{font-weight:700;font-size:13.5px;}
  .contact .cr{font-size:12px;color:var(--progress);font-weight:600;margin-top:2px;}
  .contact .co{font-size:12px;color:var(--muted);margin-top:2px;}

  .overall .toprow{display:flex;justify-content:space-between;align-items:baseline;margin:14px 0 10px;}
  .overall h2{font-size:13px;letter-spacing:1.5px;text-transform:uppercase;margin:0;color:var(--text-soft);}
  .overall .pct{font-size:30px;font-weight:800;color:var(--text);}
  .bar{height:14px;background:var(--bar-track);border-radius:8px;overflow:hidden;}
  .bar span{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--olive),var(--complete));border-radius:8px;transition:width .3s ease;}
  .counts{font-size:12.5px;color:var(--muted);margin-top:10px;}
  .counts b{color:var(--text);}
  .legend{display:flex;gap:16px;flex-wrap:wrap;font-size:11.5px;color:var(--muted);margin-top:10px;}
  .legend .dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:5px;vertical-align:middle;}

  table{width:100%;border-collapse:collapse;}
  th{text-align:left;font-size:10.5px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);
    font-weight:600;padding:12px 8px 6px;border-bottom:1px solid var(--line);}
  td{padding:11px 8px;border-bottom:1px solid var(--line-soft);vertical-align:middle;font-size:13.5px;}
  tr:last-child td{border-bottom:none;}
  .deliv{width:56%;font-weight:500;} .col-status{width:140px;} .col-date{width:120px;}
  .pill{display:inline-block;border-radius:20px;padding:5px 13px;font-size:12px;font-weight:600;color:#fff;white-space:nowrap;}
  .s-notstarted{background:var(--notstarted);} .s-progress{background:var(--progress);} .s-complete{background:var(--complete);}
  .date-val{color:var(--text-soft);} .date-val.none{color:var(--muted);opacity:.6;}
  .mini{height:5px;width:90px;flex:0 0 auto;background:var(--bar-track);border-radius:4px;overflow:hidden;margin-left:14px;}
  .mini span{display:block;height:100%;background:var(--complete);border-radius:4px;}
  .viewlink{font-size:11.5px;font-weight:600;color:var(--accent);text-decoration:none;white-space:nowrap;}
  .dlinks{display:flex;flex-wrap:wrap;gap:5px 14px;margin-top:5px;}
  .viewlink:hover{text-decoration:underline;}

  .timeline .month{display:flex;gap:16px;padding:12px 0;border-bottom:1px solid var(--line-soft);}
  .timeline .month:last-child{border-bottom:none;}
  .timeline .mlabel{flex:0 0 150px;font-weight:700;font-size:13px;text-transform:uppercase;letter-spacing:.5px;}
  .timeline .mlabel span{display:block;font-weight:400;font-size:11.5px;color:var(--muted);letter-spacing:0;text-transform:none;margin-top:2px;}
  .timeline ul{margin:0;padding-left:18px;font-size:13.5px;color:var(--text-soft);}
  .timeline li{margin-bottom:3px;}
  .scope-note{font-size:12px;color:var(--muted);background:var(--note-bg);border-radius:8px;padding:12px 16px;margin-bottom:4px;}
  .scope-note b{color:var(--text-soft);}

  .feed .fitem{display:flex;gap:14px;padding:10px 0;border-bottom:1px solid var(--line-soft);}
  .feed .fitem:last-child{border-bottom:none;}
  .feed .fdate{flex:0 0 80px;color:var(--muted);font-size:12px;font-weight:600;padding-top:1px;}
  .feed .ftext{color:var(--text-soft);font-size:13.5px;}

  .tabs{display:flex;gap:4px;margin-bottom:20px;border-bottom:1px solid var(--line);}
  .tab{border:none;background:none;font-family:inherit;font-size:13.5px;font-weight:600;color:var(--muted);padding:10px 15px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;}
  .tab:hover{color:var(--text-soft);}
  .tab.active{color:var(--text);border-bottom-color:var(--accent);}
  .view[hidden]{display:none;}
  body.printing .tabs{display:none;}
  footer{text-align:center;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-top:34px;}
  @media (max-width:680px){.contacts{grid-template-columns:1fr;}}
  @media print{
    :root, html[data-theme="dark"]{
      --bg:#fff; --paper:#fff; --text:#2e3a3a; --text-soft:#46514f; --muted:#7b817c;
      --line:#ccc; --line-soft:#e5e5e5; --bar-track:#e8e6df; --note-bg:#f0eee7;
      --header-bg:#2e3a3a; --header-text:#fff; --header-sub:#c7cec9; --brand:#b9c2bd;
      --sec-num-bg:#2e3a3a; --sec-border:#2e3a3a;
    }
    body{background:#fff;} .wrap{max-width:none;padding:0;} .toolbar,.tabs,.switcher,.internal-flag{display:none;}
    header,section{border:1px solid #ccc;box-shadow:none;break-inside:avoid;}
    .view[hidden]{display:block !important;} .sec-body[hidden]{display:block !important;}
    .sec-head{cursor:default;} .sec-head .chev{display:none;}
    .pill,.bar span,header,.sec-num{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  }
</style>
</head>

<div class="wrap">


  <div class="switcher" id="switcher"><span class="lbl">Client</span></div>

    <span class="bdiv" aria-hidden="true"></span>
    <img class="client-logo" id="client-logo" alt="" hidden>
    <span class="client-chip" id="client-chip"></span>
  </div>

  <header>
    <div class="hrow">
      <div class="htitle">
        <div class="eyebrow">Engagement Progress</div>

        <div class="trackbadge" id="trackbadge"></div>

      <div class="hmeta" id="hmeta"></div>

  <div class="board-callout" id="board-callout" hidden>
    <span class="bc-label">Scope</span>
    <span class="bc-text" id="board-callout-text"></span>

  <div class="toolbar">
    <button class="act" onclick="downloadPDF()">Save as PDF</button>

  <div class="tabs" role="tablist">
    <button class="tab active" data-view="deliverables" onclick="showView('deliverables')">Deliverables</button>

    <button class="tab" data-view="activity" onclick="showView('activity')">Activity</button>
  </div>

  <div id="view-deliverables" class="view">
    <div id="sections"></div>
  </div>

  <div id="view-overview" class="view" hidden>
    <section class="overview">
      <div class="sec-head" style="cursor:default"><span class="sec-num" style="background:var(--olive)">&#10022;</span><h3>Engagement Overview</h3></div>
      <p class="objective" id="objective"></p>
      <div class="contacts" id="contacts"></div>
    </section>
    <section class="timeline" id="timeline-sec" hidden>
      <div class="sec-head" style="cursor:default"><span class="sec-num" style="background:var(--olive)">&#9733;</span><h3>Milestone Timeline</h3></div>
      <div id="timeline-body"></div>
    </section>
    <div class="scope-note" id="notincluded" hidden></div>
  </div>

  <div id="view-activity" class="view" hidden>
    <section class="feed" id="feed">
      <div class="sec-head" style="cursor:default"><span class="sec-num" style="background:var(--olive)">&#8635;</span><h3>Recent Updates</h3></div>
      <div id="feed-list"></div>
    </section>
  </div>

  <footer>www.guidedgrowthmktg.com</footer>
</div>

<script>
const CLIENTS = {};
document.querySelectorAll('script[type="application/json"][id^="data-"]').forEach(function(s){ CLIENTS[s.id.replace('data-','')] = JSON.parse(s.textContent); });
const ORDER = ["prospected"];
const STATUS_LABEL = { notstarted:"Not started", progress:"In progress", blocked:"In progress", complete:"Complete" };
const STATUS_CLASS = { notstarted:"notstarted", progress:"progress", blocked:"progress", complete:"complete" };

let activeClient = (typeof ORDER!=="undefined" && ORDER.length) ? ORDER[0] : "edlio";
try{ const s=localStorage.getItem('cpt-client'); if(s && CLIENTS[s]) activeClient = s; }catch(e){}
let DATA = CLIENTS[activeClient];

function esc(s){ return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmt(d){ if(!d) return ""; const dt=new Date(d+"T00:00:00"); return isNaN(dt)?d:dt.toLocaleDateString('en-US',{month:'short',day:'numeric'}); }
function nextSync(days){ if(!days||!days.length) return null; const t=new Date(); for(let i=1;i<=7;i++){ const d=new Date(t); d.setDate(t.getDate()+i); if(days.indexOf(d.getDay())>=0) return d; } return null; }
function linksHtml(it){
  var ls = (it.links && it.links.length) ? it.links : (it.link ? [{label:'View', url:it.link}] : []);
  if(!ls.length) return '';
  return '<div class="dlinks">'+ls.map(function(l){ return '<a class="viewlink" href="'+l.url+'" target="_blank" rel="noopener">'+esc(l.label)+' &#8599;</a>'; }).join('')+'</div>';
}
function downloadPDF(){ window.print(); }
function toggleTheme(){
  const cur = document.documentElement.getAttribute('data-theme')==='dark' ? 'light' : 'dark';
  setTheme(cur);
  try{ localStorage.setItem('cpt-theme', cur); }catch(e){}
}
function applyClientLogo(){
  const img=document.getElementById('client-logo'), chip=document.getElementById('client-chip');
  const bl=(typeof DATA!=='undefined' && DATA) ? DATA.brandLogo : null;
  if(bl && (bl.light||bl.dark)){
    const dark=document.documentElement.getAttribute('data-theme')==='dark';
    img.src = dark ? (bl.dark||bl.light) : (bl.light||bl.dark);
    img.alt = ((DATA.engagement&&DATA.engagement.client)||'')+' logo';
    img.hidden=false; if(chip) chip.hidden=true;
  } else {
    img.hidden=true; img.removeAttribute('src'); if(chip) chip.hidden=false;
  }
}
function setTheme(t){
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('themeBtn').textContent = t==='dark' ? 'Light mode' : 'Dark mode';
  applyClientLogo();
}
function buildSwitcher(){
  const sw=document.getElementById('switcher');
  if(ORDER.length<=1){ sw.style.display='none'; return; }
  ORDER.forEach(id=>{
    const b=document.createElement('button');
    b.className='cbtn'+(id===activeClient?' active':'');
    b.textContent=CLIENTS[id].engagement.client;
    b.dataset.client=id;
    b.onclick=()=>switchClient(id);
    sw.appendChild(b);
  });
}
function switchClient(id){
  if(!CLIENTS[id]) return;
  activeClient=id; DATA=CLIENTS[id];
  try{ localStorage.setItem('cpt-client', id); }catch(e){}
  document.querySelectorAll('.cbtn').forEach(b=>b.classList.toggle('active', b.dataset.client===id));
  showView('deliverables');
  render();
}
function toggleSec(head){
  const body=document.getElementById(head.dataset.body);
  const collapsed = head.classList.toggle('collapsed');
  if(body) body.hidden = collapsed;
}
function toggleAll(){
  const heads=document.querySelectorAll('#sections .sec-head');
  const anyOpen=[...heads].some(h=>!h.classList.contains('collapsed'));
  heads.forEach(h=>{ const body=document.getElementById(h.dataset.body); h.classList.toggle('collapsed',anyOpen); if(body) body.hidden=anyOpen; });
  document.getElementById('expandBtn').textContent = anyOpen ? 'Expand all' : 'Collapse all';
}
function renderBadge(pct){
  const b=document.getElementById('trackbadge'); if(!b) return;
  const done=pct>=100;
  b.className='trackbadge '+(done?'tb-done':'tb-green');
  b.innerHTML='<span class="tb-dot"></span>'+(done?'All deliverables complete':'On track');
}
function showView(v){
  document.querySelectorAll('.view').forEach(el=>{ el.hidden = (el.id!=='view-'+v); });
  document.querySelectorAll('.tab').forEach(b=>{ b.classList.toggle('active', b.dataset.view===v); });
}
function renderFeed(){
  const log=(DATA.log||[]).slice().sort((a,b)=>(b.date||'').localeCompare(a.date||'')).slice(0,8);
  const list=document.getElementById('feed-list');
  list.innerHTML = log.length
    ? log.map(e=>`<div class="fitem"><span class="fdate">${fmt(e.date)}</span><span class="ftext">${e.text||''}</span></div>`).join('')
    : '<div class="fitem"><span class="ftext" style="color:var(--muted)">No updates yet. This feed fills in as work ships.</span></div>';
}
function renderTimeline(){
  const sec=document.getElementById('timeline-sec'), body=document.getElementById('timeline-body');
  const ms=DATA.engagement.milestones||[];
  if(!ms.length){ sec.hidden=true; body.innerHTML=''; return; }
  sec.hidden=false;
  body.innerHTML=ms.map(m=>`<div class="month"><div class="mlabel">${esc(m.label)}${m.sub?`<span>${esc(m.sub)}</span>`:''}</div><ul>${(m.items||[]).map(i=>`<li>${esc(i)}</li>`).join('')}</ul></div>`).join('');
  const ni=document.getElementById('notincluded');
  if(DATA.engagement.notIncluded){ ni.hidden=false; ni.innerHTML=`<b>Not included:</b> ${esc(DATA.engagement.notIncluded)}`; }
  else { ni.hidden=true; ni.innerHTML=''; }
}
function renderBoardCallout(){
  const c=document.getElementById('board-callout'), t=document.getElementById('board-callout-text');
  if(DATA.engagement.boardNote){ c.hidden=false; t.textContent=DATA.engagement.boardNote; }
  else { c.hidden=true; t.textContent=''; }
}
function render(){
  const _bc=(DATA.brandColor||'').trim(); const _r=document.documentElement;
  if(_bc){ _r.style.setProperty('--accent', _bc); } else { _r.style.removeProperty('--accent'); }
  const e=DATA.engagement;
  const isRetainer = e.boardType === 'retainer';
  document.getElementById('overall-sec').hidden = isRetainer;
  document.getElementById('client-chip').textContent = e.client || "";
  applyClientLogo();
  document.getElementById('h1title').textContent = e.client || "";
  document.getElementById('subline').textContent = "Prepared for " + (e.preparedFor||"");
  document.getElementById('objective').textContent = e.objective || "";
  document.getElementById('contacts').innerHTML = (e.contacts||[]).map(c=>
    `<div class="contact"><div class="cn">${esc(c.name)}</div><div class="cr">${esc(c.role||'')}</div><div class="co">${esc(c.org||'')}</div></div>`).join('');

  renderBoardCallout();

  const root=document.getElementById('sections'); root.innerHTML="";
  DATA.sections.forEach((sec,idx)=>{
    const el=document.createElement('section');
    const sc=sec.items.filter(i=>i.status==="complete").length, st=sec.items.length, sp=st?Math.round(sc/st*100):0;
    const allComplete = st>0 && sc===st;
    const bodyId='secbody-'+idx;
    const thead = isRetainer
      ? `<thead><tr><th class="deliv">Deliverable</th><th class="col-status">Status</th><th class="col-date">Delivered</th></tr></thead>`
      : `<thead><tr><th class="deliv">Deliverable</th><th class="col-status">Status</th><th class="col-date">Target</th><th class="col-date">Completed</th></tr></thead>`;
    const rows = sec.items.map(it=>{
      const base = `<td class="deliv">${esc(it.label)}${linksHtml(it)}</td><td><span class="pill s-${STATUS_CLASS[it.status]}">${STATUS_LABEL[it.status]}</span></td>`;
      if(isRetainer) return `<tr>${base}<td><span class="date-val ${it.done?'':'none'}">${it.done?fmt(it.done):'-'}</span></td></tr>`;
      return `<tr>${base}<td><span class="date-val ${it.target?'':'none'}">${it.target?fmt(it.target):'-'}</span></td><td><span class="date-val ${it.done?'':'none'}">${it.done?fmt(it.done):'-'}</span></td></tr>`;
    }).join('');
    const progLabel = isRetainer ? `${sc} delivered` : `${sc}/${st} complete`;
    const miniBar = isRetainer ? '' : `<div class="mini"><span style="width:${sp}%"></span></div>`;
    el.innerHTML=`
      <div class="sec-head" role="button" tabindex="0" data-body="${bodyId}" onclick="toggleSec(this)" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();toggleSec(this);}">
        <span class="chev">&#9662;</span>
        <span class="sec-num">${esc(sec.num)}</span><h3>${esc(sec.title)}</h3>
        <span class="sec-prog">${progLabel}</span>${miniBar}</div>
      <div class="sec-body" id="${bodyId}">
        <table>${thead}<tbody>${rows}</tbody></table>
      </div>`;
    root.appendChild(el);
    if(allComplete){ el.querySelector('.sec-head').classList.add('collapsed'); el.querySelector('.sec-body').hidden=true; }
  });
  const heads=document.querySelectorAll('#sections .sec-head');
  const anyOpen=[...heads].some(h=>!h.classList.contains('collapsed'));
  document.getElementById('expandBtn').textContent = anyOpen ? 'Collapse all' : 'Expand all';

  const all=DATA.sections.flatMap(s=>s.items), total=all.length||1;
  const c=all.filter(i=>i.status==="complete").length;
  const p=all.filter(i=>i.status==="progress"||i.status==="blocked").length;
  const n=all.filter(i=>i.status==="notstarted").length;
  const pct=Math.round((c/total)*100);
  document.getElementById('pct').textContent=pct+"%";
  document.getElementById('barfill').style.width=pct+"%";
  document.getElementById('counts').innerHTML=`<b>${c}</b> complete &middot; <b>${p}</b> in progress &middot; <b>${n}</b> upcoming &middot; <b>${all.length}</b> total deliverables`;
  document.getElementById('hmeta').innerHTML=`<div class="mitem"><span class="ml">Timeline</span><span class="mv">${esc(e.dates)}</span></div><div class="mitem"><span class="ml">Engagement</span><span class="mv">${esc(e.note)}</span></div>` + (isRetainer ? '' : `<div class="mitem"><span class="ml">Progress</span><span class="mv">${pct}% complete</span></div>`);
  const _lu=DATA.lastUpdated?new Date(DATA.lastUpdated+'T00:00:00'):null; document.getElementById('updated').textContent=_lu?_lu.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}):"-";
  const _nw=document.getElementById('nextwrap'), _ns=nextSync(DATA.updateDays); if(_nw){ if(_ns){ document.getElementById('nextupd').textContent=_ns.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}); _nw.hidden=false; } else { _nw.hidden=true; } }
  if(isRetainer){ const b=document.getElementById('trackbadge'); b.className='trackbadge tb-green'; b.innerHTML='<span class=\"tb-dot\"></span>Active retainer'; } else { renderBadge(pct); }
  renderFeed(); renderTimeline();
}

(function init(){
  let t="light";
  try{ t = localStorage.getItem('cpt-theme') || "light"; }catch(e){}
  setTheme(t);
  buildSwitcher();
  render();
})();
</script>
</body>
</html>
